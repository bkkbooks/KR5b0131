body:
  text: 許眞君仙傳虞一九州都仙太史髙明大使至道玄應神功妙濟眞君姓許名遜字敬之曽祖琰祖五父肅世爲許昌人髙篩不仕乃頴陽由之後也父漢末避地於豫章之南昌因家焉初毋夫人夣金鳯銜珠墮于掌中玩而吞之及覺腹動因是有孕而眞君降生焉時吳赤鳥二年正月二十八日也眞君生而頴悟少小通䟽與物無忤甞從獵射一塵鹿中之子墮鹿毋猶顧䑛之未竟而斃因是惻然感悟即棄折弓矢學道眞君刻意爲學博通經史明天文地理音律五行經緯之書尤嗜神仙脩錬之術遍叅歴考悉究玄微焉眞君聞西安吳世雲得至人丁義神方南海鮑靚秘法及天降白雲符遂往師之世雲靈感玄㑹若契宿因悉以秘要付授如今之垂世如意大丹乃丁義神方之一也西安今寜州世雲仕吳爲西安今因家焉仐去州六十里有西平靖呉仙觀即其故宅眞君與郭璞訪求名山爲樓眞之地得逍遥山金氏宅謂大合仙格乃同謁金公璞白曰許君欲置一舍爲脩鋉之地故上謁公曰許君若誠有意當倂置莊産爲薪水資眞君曰雖蒙傾蓋受之無名願聞所需多寡惟命公曰大丈夫一言道合身命猶以許人況外物乎乃取一大錢中破之各收其半爲劵焉眞君居金氏宅日以脩鍊爲事不求聞逹郷黨化其孝友交遊服眞德義人有餽遺苟非眞義一介不取甞有售鐡燈檠者因夜然燈有漆剥處視之乃金也翌日訪元主還之眞君道譽日著郡舉孝廉不就朝廷累加禮命不得巳乃以太康元年起爲蜀郡旌陽令時年四十二視事之初誡胥吏去貪鄙除煩苛脱囚縶悉開諭以道吏民恱服咸願自新其教民忠孝慈仁忍愼動儉爲先令秀民有德望者相與勸舉故争競日消至於無訟時胡詹二典押爲之掌案聽政焉令廟食爲神眞君未任縣之先歳饑民無以輸租郡邑繩以法率多流移暨蒞事日乃以靈丹點瓦礫化黄金今人濳瘞於縣之後圃一日籍民之未輸者咸造于庭使史詰責之令服力役於後圃民钁地獲金得以輸納故免逃竄之憂遂悉按堵鄰境流移之民慕其德惠來依附者甚衆遂至縣邑戸口增衍人物富庶焉郡中屬歳大疫民死者十有七八眞君乃以所得神方拯治之凡符呪所及皆登時而愈至於沈痾之疾亦無不痊者郡中疫民既活救濟之道傳聞他郡病者相繼而至日以千計於是標竹於郭外十里之江置符於其中俾就竹下飲之皆瘥其悼耄嬴疾不能自至者汲歸飲之亦獲痊愈故蜀民爲之謡曰民無盗竊吏無奸欺我君活人病無能爲眞君任旌陽既乆知𣈆室將亂乃棄官東歸蜀民感其德化無計借留所在立生祠家傳盡像敬事如紳明焉啓行之日贏粮而送者蔽野有至千里始還者有隨至其宅願服役而不返者乃於宅東之隙地結苃以居其狀如營壘悉攺氏族以従眞君之姓故至今其地號許家營焉其遺愛及民有如此者眞君與呉君遊嵩陽聞金陵丹陽縣黄堂靖有女師諶姆多道術同徃師之姆曰昔孝悌王自上清下降兖州曲阜縣蘭公家留下金丹寳經銅符鐡劵謂公曰後𣈆代當有神仙許遜傳吾此道命公轉以授吾使掌之以俟子積有年矣今當授千乃登壇依科盟授并正一斬邪之法三五飛歩之術悉以傳付二君前受諶姆道法禮謝訖辭行眞君方心期毎歳必來謁姆蜴覺之曰子勿來吾即返帝郷矣乃取香茆一根望南擲之曰子歸認茆落處立吾祠歳秋一至足矣二君還首訪飛茆之迹於所居之南四十餘里得之巳叢生矣遂建祠宇亦以黃堂名之今號曰黄堂隆道宫毎歳仲秋之三日必徃朝謁焉眞君自嵩陽回訪諶姆飛茆之迹經過路傍偶見陂水清澈爲之少憇今清陂村有憇眞靖爲觀是其處也又見郷民盛烹宰以祀神且相詫曰祭或不腆則神怒降禍矣眞君曰恠崇敢爾耶乃夜宿於逆旅召烈風迅雷伐之㧞其林木明日告其里人曰妖社巳驅毋用祭也今其地有廢社郷民不復祭祀眞君尋訪飛茆經過之地見郷民負檐遠汲者滿道老幼勞苦乃以杖刺社前涸澤湧泉以濟之雖旱不竭今大澤村紫陽靖之石井也眞君甞登龍城之山巔指山腰之泉罅曰是必有異物藏于其中後將爲妖孽以害生民遂卓劔運法建立壇靖以鎮之今毎年仙馭朝諶姆則憇于此號龍城觀眞君渡小蜀江即今之黃湖口扺江干之肆主人朱氏雖貧而迎接能盡禮敬真君乃戲盡一松于壁而去其家即日市利加倍後江漲潰堤市舍俱漂惟松壁不壞也今名松湖市見有朱土地廟食焉眞君甞錬神丹於艾城之黃龍山山湫有蛟魅聚淵藪作洪水欲漂丹室於是眞君遣神兵擒之釘于石壁今釘蛟石倶在眞君神丹既成乃祭于幕阜山葛仙翁之石室眞君至脩川愛其湍急而味堅取神劒磨于澗傍之石即今號梅山旌陽觀眞君渡水登秀峯爲壇於峯頂以醮謝上帝乃服仙丹今號旌陽山溪南有呉仙觀即呉眞君故居也眞君造呉君之宅過西安縣即今寧州社伯出謁乃詰其地分有妖孽爲民害者其神匿之眞君行過一小廟五神人迎謁而告曰此地又有蛟孽毒害生民知仙君來此故徃鄂渚藏避矣後將復還願爲斯民除之廟神姓毛兄弟五人今曰恊佑廟在州東四百歩眞君如廟神之言躡迹追蛟至鄂渚路逢三老人詢其蛇孽蹤穴所在指曰見伏于前橋下眞君至橋側仗劔叱之蛟驚奔入大江匿子淵乃勑史兵驅之蛟從上流奔出遂誅之三老人即普應三王廟食其地今有伏龍橋上下龍口眞君怒西安社伯匿蛟而不職錮其祠門止其享祀令居民事娃毛之小廟今寧州城隍廟正門常閉開則邑有災恊佑廟食甚盛眞君還郡城曰此地水陸衝要人物繁夥豈無分合神仙之人試以靈丹數粒雜他藥貨之令其信縁而取竟無一人遇者眞君吁歡仙才之難得也眞君開新吳有蛟爲孽因持寳劒捕逐經今仙遊觀之地蛟懼竄入溪穴即今藏溪眞君乃以巨石書符及作鎮蛟文以鎭之文石尚存于今之奉新縣西十里延眞觀院海昬之上遼有一巨蛇據山爲穴吐氣成雲豆四十里吞吸人物大爲生民害眞君聞之乃登北嶺即今會仙峯驗之果見毒氣漲空乃集弟子將來誅之初入其界遠近居民千百人競來懇訴眞君惻然曰世運周流際此厄會生民何罪乃受其災吾之此來正爲是事誓不與此蛇倶生也嘗爲汝曹除之眞君群弟子既集亦同勸請誅蛇眞君曰須時至乃可於是卓劒于地對天黙禱良乆飛泉湧出俄有赤鳥飛過眞君曰時至矣其地爲候時觀後攺赤鳥夀聖今曰廣福觀眞君至蛇所郷民咸鼓譟趨前聽命乃卓劒布氣飛符召海昏社伯南昌社公并力驅蛇出穴其符落處因建觀名符落今南昌太和觀是也蛇出穴舉首十餘丈吐毒衝天眞君嘯命風雷指呼神兵令吳君飛歩引劒劈其首施岑甘戰等揮劔裂腹有小蛇自腹岀長數文甘君欲斬之眞君曰彼未爲害不可妄誅小蛇奔七里聞鼓譟回顧其毋弟子請迫戮之眞君曰此蛇五百年復若爲民害吾當復岀誅之以吾壇前松栢拂地爲驗又曰吾仙去後一千二百四十年間豫章之境五陵之内當出地仙八百人其師岀於豫章大揚吾教郡江心生沙洲掩過沙井口之時小蛇苦爲民害彼八百人自當誅之若無害於民亦不可誅也蛇子遂得入港今建昌有蛇子港七里聽新建有呉城廟是也眞君既誅巨蟒妖血汙劒於是磨洗之且削石以試其鋒今建昌州有冷水臺磨劒池試劒石存馬眞君告弟子曰大蛇雖滅蛟精未誅彼物通靈必知吾有除害之意恐其伺隙潰郡城盍歸郡乎戰岑二子者從我焉時永嘉六年也眞君道術髙妙著聞遠邇求爲弟子者動以千計郤之不可得乃化炭爲美婦人夜散群弟千處以試之明旦閱之其不爲所染汙者惟十人爾即異時驂侍前後上昇諸髙弟也自是凡周遊江湖誅斬蛟蛇無不從馬餘多自愧而去今建昌州西津名炭婦市立觀號妙明眞君與甘施二君歸郡周覧城邑適有一少年羙風度衣冠甚偉通謁自稱姓愼禮貌勤恪應對捷給據告去眞君顧謂群弟子曰適者非人乃老蛟之精故來見試也其人體貌雖是而腥風襲人吾故愚之庶盡得其醜類耳眞君知年少乃老蛟之精跡其所之乃在江滸化爲黄牛卧於沙蹟之上眞君乃剪紙化一黒牛往闘之眞君今弟子跡蛟精所之乃在郡城江滸化爲黄牛卧于沙磧之上即今之黄牛洲眞君乃剪紙化爲黒牛去後又令施岑潜持劒往伺其闘酣即揮之果中其左股牛奔入城南之并中井今在上籃寺東南角故世亦號蛟井眞君遣符吏追蛟精至長沙賈誼幷中出化爲人入賈玉家先是玉妻以女居數歳生二子毎春夏出舟秋重載歸是時忽徒還紿玉云被劫傷股玉召醫眞君爲醫士謁玉召之不出乃上堂叱曰江湖蛟精害物非一吾尋蹤至此豈容逃避速岀乃見形遂揮兵誅之噀二子爲小蛟并誅之賈女幾變父毋告遂免眞君謂賈玉曰蛟精所居其下即水今君舍下深不踰尺皆洪波也可速徙居毋自陷溺玉舉家駭惶移居髙原其地不日陷爲淵潭深不可測今長沙昭潭是也眞君復還豫章而蛟精之餘黨甚盛慮眞君必誅之心不自安乃化而爲人散遊城市因訪眞君弟子詭言曰僕家長安積世崇善遠聞賢師許君有神劔願聞其功弟子曰吾師神劒指天天裂指地地坼指星辰則失度指江河則逆流萬邪莫可當神聖之寳也又問抑有不能傷者乎曰惟不能傷冬瓜葫蘆耳蛟精以前言爲誠然乃盡化其屬爲冬瓜葫蘆聮延枝夢浮泛滿江擬流岀境眞君晨興覺妖氛甚盛乃顧江中見蛟精所化即以劒授施岑使履水斬之黨屬茹連悉無噍類江流爲之變色眞君鑄鐡柱既成聽其出井外數尺下施八索鉤鎖地脉祝之曰鐡拄若亞其妖再興吾當復出鐵柱若正其妖永除由是水妖屛跡城邑無虞復恐後世姦雄妄作故因鐡柱再垂記云地勝人心善應不出姦讎縱有興謀者終須不到頭其慮後世也深大率有如此者眞君以蛟蜃之屬有散入鄱陽潯陽界者慮其復還乃周行江湖以殄滅之至岩嶤山頂有蛟湖三所孔穴透大江通饒信遂誅其蛟魅立玉陽府靖開化靖太城府靖以鎮之鑄鐡符鎭鄱陽湖口杜其入路今在湖口縣上鍾石江中鑄鐡蓋覆廬陵玄潭制其藏藪仍壓以鐵符鎭以靈劒今有飛符嶺崇眞觀將軍王敦舉兵内向次于湖眞君興吳君及郭璞同徃謁之敦宴曰予夣一木破天如何眞君曰非佳兆也呉君曰木上破天未字也令璞筮之曰無成敦曰予夀㡬何璞曰若舉事禍將不乆若還武昌夀未可量敦怒曰君夀幾何璞曰盡今日日中即令武士擒璞斬之眞君擲杯化鴿繞粱敦舉目失二君所在眞君與吳君遊至金陵欲賃舟復回豫章而船主告以乏操舟者眞君曰爾等但暝目安坐切毋覘視吾自爲爾駕之舟人諾眞君召二龍挾舟而行經池陽以印印西岸之崖壁辟水恠而行今印文猶在龍舟凌空俄過廬山頂至紫霄峯金闕洞眞君與呉君欲遊洞中故其舟稍低抺林稍戞戞有聲舟人不能忍而竊窺之二龍即捨舟於層岫之上折桅於深澗之下眞君謂舟人曰汝不聽吾言將何所歸乎舟人乃拜求濟度眞君教以服餌靈草遂得不死之衘盡隱於此山今有鐡船峯并桅爲石墮在澗中眞君歸舊隱數十年間不以時事關意日與群弟子講究眞詮精脩至道作醉思仙歌又著八寳訓曰忠孝廠愼寛裕容忍忠則不欺孝則不悖廉而罔貪愼乃無失寛則得衆裕然有餘容而翕受忍則安舒郷里化之皆遷善遠罪孝悌興行平時岀處隨機應物不異常人但所居之地鳴鶴翔飛景雲旌繞而已寜康二年甲戌眞君一百三十六歳八月朔有雲仗自天二仙乗輦下降導從甚都眞君向空迎拜二仙曰奉玉皇命賜紫詔授九州都仙太史兼髙明大使賜紫綵羽袍玉膏金丹各一合眞君禮拜聼受訖一仙曰余乃玉眞上公崔千文一仙曰余乃元眞大卿瑕丘仲就告眞君冲舉之日復登雲車而去眞君召集門弟子與郷曲耆老諭以行期太會于眞君之庭日設宴飲共叙惜别且教以行善立功以致神仙之旨著靈劒子等書又與十一弟子各爲五言二韻勸誡詩十首及遺世又以大功如意丹方傳衆弟子之不與上昇者勸誡詩即今一百二十靈籖也如意丹方亦行于世毎歳尚有黄中齋會云八月十五日營齊會遍召里人長少畢集至日中祥雲彌望音樂騰空羽蓋龍車從官兵衛仙童綵女導從崔瑕二詔使復降宜玉皇詔命云巳仰潜山司命官傳金丹於下界閉債封形迴千身及家口廚宅百好歸三天子急淨穢背土凌空左大力天丁與流金火鈴照辟中黄無或散慢眞君俯拜欽受眞君遵詔使玉眞上公之言以門弟子雖衆惟六人合從行餘各自有超舉之日不得偕行乃昇龍車命陳勳時荷持策前導周廣曽亨驂御黄仁覧與其父族侍従盱烈與毋部從仙眷四十二口㧞宅同時昇舉雞犬亦隨逐飛騰里人攀戀投地悲號不忍别去眞君乃留下脩行鍾并石函𦕅爲異時之記眞君有役夫許大聞將上昇苦求隨行眞君以詔使告人數有定命不徇所請預期聽其與妻運米出西嶺及聞昇舉乃倉惶奔歸推履米車暨至撫膺望號眞君乃授以地仙子術夫婦偕隐千西山其米覆地復生既隱不欲人識攺姓午復姓干見廟食于生米市翻車岡時人或百遇見之者蓋岀没不常焉仙仗凌空有頃墜下藥曰車轂各一又墜一雞籠于宅之東南十有餘里并䑕數枚墮地巳拖膓而不死意其曽竊食仙丹也後人或有見之者必爲瑞應焉昇天後綵霞祥雲瀰漫山谷百里之内異香經月不散初眞君自旌陽回奉蜀錦爲質信於諶姆姆制爲殿惟至是忽飛來遊繞故宅之上竟日復入雲霄眞君初與郭璞尋眞選勝經宜春棲梧山王長史之千朔迎欵敬至眞君授仙術且云此地前對洞天俯臨袁水宜爲道院朔從之遂書靖宇于壁而退及飛昇時雲軿過其上遣二青衣告别朔舉家祈度眞君曰子輩仙骨未充乃飛仙茆一根俾植之乆服可長生後王族各百齡今臨江玉盧觀有仙茆存焉玄都御史神烈呉眞君名猛宇世雲濮陽人性至孝以道法行呉𣈆間嘗以羽扇畫豫章江而渡寧康二年十月望奉天詔與弟千四人飛昇潜惠彭眞君名伉宇武陽仕𣈆爲尚書左丞師眞君成道宋髙祖永初二年八月二十四日舉家二十六口上昇今龍興城宗華觀是其故址也洪施時眞君名荷宇道陽東海沐陽縣奉仙觀黃冠上士依棲眞君成道能役使鬼神驅剪邪魅及眞君冲昇日命執策前導焉元通周眞君名廣宇恵常廬陵人師事眞君遵行道法夙夜惟勒就宅西百餘歩築室以居今宜詔福地太虛觀眞君冲舉日驂龍車上昇精行甘眞君名戰字伯武豐藏人師事眞君除害利物陳天建元年正月七日天詔下駕麟車冲昇今富州清都觀乃藏丹之故宅號飛簧觀勇悟施眞君名岑字大玉九江人勇徤絶倫師事眞君成道寧康二年十月二十八日奉天詔冲昇西嶺至德觀即其眺望水妖之臺也神惠曾眞君名亨字興國泗水人博學多能師事眞君要道靈符神方秘訣無不備悉後驂龍卓同時昇舉今富州眞陽觀是其遺迹正特陳眞君名勲字孝舉蜀川人博學洽聞眞君任旌陽日付以吏職後引爲門弟子託以腹心典經籍守丹罏眞君冲舉日命執策前導馬和靖旴眞君名烈字道微少孤事毋孝毋乃眞君孟姊也眞君以孀居築室于宅西居之母子得道並受詔命部從眞君仙眷四十二口上昇冲道黃眞君名仁覧字紫庭髙安人任青州事眞君以子妻之父輔字萬石舉孝廉任御史同師事眞君得道舉家三十二口従眞君上昇普惠鍾離眞君名嘉字公陽眞君仲姊之子少丧父母眞君授以至道寜康二年十月十五日奉天詔冲昇令新建縣象牙山丹陵觀是其故址洞眞胡天師名惠超字㧞俗不知何代人居豫章西山洪井眞君授以三元九紀之道唐長安三年二月望冲昇今龍典玄妙觀是其伐樟樹精去處許眞君仙傳
