body:
  text: 許真君仙傳虞一九州都仙太史髙明大使至道玄應神功妙濟真君姓許名遜字敬之曽祖琰祖五父肅世為許昌人髙篩不仕乃頴陽由之後也父漢末避地於豫章之南昌因家焉初毋夫人夢金鳯銜珠墮于掌中玩而吞之及覺腹動因是有孕而真君降生焉時吳赤鳥二年正月二十八日也真君生而頴悟少小通疏與物無忤嘗從獵射一塵鹿中之子墮鹿毋猶顧䑛之未竟而斃因是惻然感悟即棄折弓矢學道真君刻意為學博通經史明天文地理音律五行經緯之書尤嗜神仙修錬之術遍參歷考悉究玄微焉真君聞西安吳世雲得至人丁義神方南海鮑靚祕法及天降白雲符遂往師之世雲靈感玄㑹若契宿因悉以祕要付授如今之垂世如意大丹乃丁義神方之一也西安今寧州世雲仕吳為西安今因家焉仐去州六十里有西平靖吳仙觀即其故宅真君與郭璞訪求名山為樓真之地得逍遙山金氏宅謂大合仙格乃同謁金公璞白曰許君欲置一舍為修鋉之地故上謁公曰許君若誠有意當並置莊産為薪水資真君曰雖蒙傾蓋受之無名願聞所需多寡惟命公曰大丈夫一言道合身命猶以許人況外物乎乃取一大錢中破之各收其半為劵焉真君居金氏宅日以修鍊為事不求聞逹鄉黨化其孝友交遊服真德義人有餽遺苟非真義一介不取嘗有售鐡燈檠者因夜然燈有漆剝處視之乃金也翌日訪元主還之真君道譽日著郡舉孝廉不就朝廷纍加禮命不得巳乃以太康元年起為蜀郡旌陽令時年四十二視事之初誡胥吏去貪鄙除煩苛脫囚縶悉開諭以道吏民恱服咸願自新其教民忠孝慈仁忍愼動儉為先令秀民有德望者相與勸舉故爭競日消至於無訟時胡詹二典押為之掌案聽政焉令廟食為神真君未任縣之先歲饑民無以輸租郡邑繩以法率多流移暨蒞事日乃以靈丹點瓦礫化黃金今人濳瘞於縣之後圃一日籍民之未輸者咸造于庭使史詰責之令服力役於後圃民钁地獲金得以輸納故免逃竄之憂遂悉按堵鄰境流移之民慕其德惠來依附者甚衆遂至縣邑戶口增衍人物富庶焉郡中屬歲大疫民死者十有七八真君乃以所得神方拯治之凡符呪所及皆登時而愈至於沈痾之疾亦無不痊者郡中疫民既活救濟之道傳聞他郡病者相繼而至日以千計於是標竹於郭外十里之江置符於其中俾就竹下飲之皆瘥其悼耄嬴疾不能自至者汲歸飲之亦獲痊愈故蜀民為之謡曰民無盜竊吏無奸欺我君活人病無能為真君任旌陽既久知𣈆室將亂乃棄官東歸蜀民感其德化無計借留所在立生祠家傳盡像敬事如紳明焉啓行之日贏糧而送者蔽野有至千里始還者有隨至其宅願服役而不返者乃於宅東之隙地結苃以居其狀如營壘悉攺氏族以從真君之姓故至今其地號許家營焉其遺愛及民有如此者真君與吳君遊嵩陽聞金陵丹陽縣黃堂靖有女師諶姆多道術同往師之姆曰昔孝悌王自上清下降兖州曲阜縣蘭公家留下金丹寶經銅符鐡劵謂公曰後𣈆代當有神仙許遜傳吾此道命公轉以授吾使掌之以俟子積有年矣今當授千乃登壇依科盟授并正一斬邪之法三五飛步之術悉以傳付二君前受諶姆道法禮謝訖辭行真君方心期每歲必來謁姆蜴覺之曰子勿來吾即返帝鄉矣乃取香茆一根望南擲之曰子歸認茆落處立吾祠歲秋一至足矣二君還首訪飛茆之迹於所居之南四十餘里得之巳叢生矣遂建祠宇亦以黃堂名之今號曰黃堂隆道宫每歲仲秋之三日必往朝謁焉真君自嵩陽回訪諶姆飛茆之迹經過路傍偶見陂水清徹為之少憩今清陂村有憩真靖為觀是其處也又見鄉民盛烹宰以祀神且相詫曰祭或不腆則神怒降禍矣真君曰怪崇敢爾耶乃夜宿於逆旅召烈風迅雷伐之拔其林木明日告其里人曰妖社巳驅毋用祭也今其地有廢社鄉民不復祭祀真君尋訪飛茆經過之地見鄉民負檐遠汲者滿道老幼勞苦乃以杖刺社前涸澤湧泉以濟之雖旱不竭今大澤村紫陽靖之石井也真君嘗登龍城之山巔指山腰之泉罅曰是必有異物藏于其中後將為妖孽以害生民遂卓劔運法建立壇靖以鎮之今每年仙馭朝諶姆則憩于此號龍城觀真君渡小蜀江即今之黃湖口扺江干之肆主人朱氏雖貧而迎接能盡禮敬真君乃戲盡一松于壁而去其家即日市利加倍後江漲潰堤市舍俱漂惟松壁不壞也今名松湖市見有朱土地廟食焉真君嘗錬神丹於艾城之黃龍山山湫有蛟魅聚淵藪作洪水欲漂丹室於是真君遣神兵擒之釘于石壁今釘蛟石俱在真君神丹既成乃祭于幕阜山葛仙翁之石室真君至修川愛其湍急而味堅取神劒磨于澗傍之石即今號梅山旌陽觀真君渡水登秀峯為壇於峯頂以醮謝上帝乃服仙丹今號旌陽山溪南有吳仙觀即吳真君故居也真君造吳君之宅過西安縣即今寧州社伯出謁乃詰其地分有妖孽為民害者其神匿之真君行過一小廟五神人迎謁而告曰此地又有蛟孽毒害生民知仙君來此故往鄂渚藏避矣後將復還願為斯民除之廟神姓毛兄弟五人今曰協佑廟在州東四百步真君如廟神之言躡迹追蛟至鄂渚路逢三老人詢其蛇孽蹤穴所在指曰見伏于前橋下真君至橋側仗劔叱之蛟驚奔入大江匿子淵乃勑史兵驅之蛟從上流奔出遂誅之三老人即普應三王廟食其地今有伏龍橋上下龍口真君怒西安社伯匿蛟而不職錮其祠門止其享祀令居民事娃毛之小廟今寧州城隍廟正門常閉開則邑有災協佑廟食甚盛真君還郡城曰此地水陸衝要人物繁夥豈無分合神仙之人試以靈丹數粒雜他藥貨之令其信緣而取竟無一人遇者真君吁歡仙才之難得也真君開新吳有蛟為孽因持寶劒捕逐經今仙遊觀之地蛟懼竄入溪穴即今藏溪真君乃以巨石書符及作鎮蛟文以鎮之文石尚存于今之奉新縣西十里延真觀院海昏之上遼有一巨蛇據山為穴吐氣成雲豆四十里吞吸人物大為生民害真君聞之乃登北嶺即今會仙峯驗之果見毒氣漲空乃集弟子將來誅之初入其界遠近居民千百人競來懇訴真君惻然曰世運周流際此厄會生民何罪乃受其災吾之此來正為是事誓不與此蛇俱生也嘗為汝曹除之真君群弟子既集亦同勸請誅蛇真君曰須時至乃可於是卓劒于地對天默禱良久飛泉湧出俄有赤鳥飛過真君曰時至矣其地為候時觀後攺赤鳥夀聖今曰廣福觀真君至蛇所鄉民咸鼓譟趨前聽命乃卓劒布氣飛符召海昏社伯南昌社公并力驅蛇出穴其符落處因建觀名符落今南昌太和觀是也蛇出穴舉首十餘丈吐毒衝天真君嘯命風雷指呼神兵令吳君飛步引劒劈其首施岑甘戰等揮劔裂腹有小蛇自腹出長數文甘君欲斬之真君曰彼未為害不可妄誅小蛇奔七里聞鼓譟回顧其毋弟子請迫戮之真君曰此蛇五百年復若為民害吾當復出誅之以吾壇前松柏拂地為驗又曰吾仙去後一千二百四十年間豫章之境五陵之內當出地仙八百人其師出於豫章大揚吾教郡江心生沙洲掩過沙井口之時小蛇苦為民害彼八百人自當誅之若無害於民亦不可誅也蛇子遂得入港今建昌有蛇子港七里聽新建有吳城廟是也真君既誅巨蟒妖血汙劒於是磨洗之且削石以試其鋒今建昌州有冷水臺磨劒池試劒石存馬真君告弟子曰大蛇雖滅蛟精未誅彼物通靈必知吾有除害之意恐其伺隙潰郡城盍歸郡乎戰岑二子者從我焉時永嘉六年也真君道術髙妙著聞遠邇求為弟子者動以千計郤之不可得乃化炭為美婦人夜散群弟千處以試之明旦閲之其不為所染汙者惟十人爾即異時驂侍前後上升諸髙弟也自是凡周遊江湖誅斬蛟蛇無不從馬餘多自愧而去今建昌州西津名炭婦市立觀號妙明真君與甘施二君歸郡周覽城邑適有一少年美風度衣冠甚偉通謁自稱姓愼禮貌勤恪應對捷給據告去真君顧謂群弟子曰適者非人乃老蛟之精故來見試也其人體貌雖是而腥風襲人吾故愚之庶盡得其醜類耳真君知年少乃老蛟之精跡其所之乃在江滸化為黃牛卧於沙蹟之上真君乃剪紙化一黑牛往鬪之真君今弟子跡蛟精所之乃在郡城江滸化為黃牛卧于沙磧之上即今之黃牛洲真君乃剪紙化為黑牛去後又令施岑潜持劒往伺其鬪酣即揮之果中其左股牛奔入城南之并中井今在上籃寺東南角故世亦號蛟井真君遣符吏追蛟精至長沙賈誼並中出化為人入賈玉家先是玉妻以女居數歲生二子每春夏出舟秋重載歸是時忽徒還紿玉云被劫傷股玉召醫真君為醫士謁玉召之不出乃上堂叱曰江湖蛟精害物非一吾尋蹤至此豈容逃避速出乃見形遂揮兵誅之噀二子為小蛟并誅之賈女幾變父毋告遂免真君謂賈玉曰蛟精所居其下即水今君舍下深不踰尺皆洪波也可速徙居毋自陷溺玉舉家駭惶移居髙原其地不日陷為淵潭深不可測今長沙昭潭是也真君復還豫章而蛟精之餘黨甚盛慮真君必誅之心不自安乃化而為人散遊城市因訪真君弟子詭言曰僕家長安積世崇善遠聞賢師許君有神劔願聞其功弟子曰吾師神劒指天天裂指地地坼指星辰則失度指江河則逆流萬邪莫可當神聖之寶也又問抑有不能傷者乎曰惟不能傷冬瓜葫蘆耳蛟精以前言為誠然乃盡化其屬為冬瓜葫蘆聮延枝夢浮泛滿江擬流出境真君晨興覺妖氛甚盛乃顧江中見蛟精所化即以劒授施岑使履水斬之黨屬茹連悉無噍類江流為之變色真君鑄鐡柱既成聽其出井外數尺下施八索鉤鎖地脉祝之曰鐡拄若亞其妖再興吾當復出鐵柱若正其妖永除由是水妖屛跡城邑無虞復恐後世姦雄妄作故因鐡柱再垂記云地勝人心善應不出姦讎縱有興謀者終須不到頭其慮後世也深大率有如此者真君以蛟蜃之屬有散入鄱陽潯陽界者慮其復還乃周行江湖以殄滅之至岩嶤山頂有蛟湖三所孔穴透大江通饒信遂誅其蛟魅立玉陽府靖開化靖太城府靖以鎮之鑄鐡符鎮鄱陽湖口杜其入路今在湖口縣上鍾石江中鑄鐡蓋覆廬陵玄潭制其藏藪仍壓以鐵符鎮以靈劒今有飛符嶺崇真觀將軍王敦舉兵內向次于湖真君興吳君及郭璞同往謁之敦宴曰豫夢一木破天如何真君曰非佳兆也吳君曰木上破天未字也令璞筮之曰無成敦曰豫夀幾何璞曰若舉事禍將不久若還武昌夀未可量敦怒曰君夀幾何璞曰盡今日日中即令武士擒璞斬之真君擲杯化鴿繞粱敦舉目失二君所在真君與吳君遊至金陵欲賃舟復回豫章而船主告以乏操舟者真君曰爾等但暝目安坐切毋覘視吾自為爾駕之舟人諾真君召二龍挾舟而行經池陽以印印西岸之崖壁辟水怪而行今印文猶在龍舟凌空俄過廬山頂至紫霄峯金闕洞真君與吳君欲遊洞中故其舟稍低抹林稍戞戞有聲舟人不能忍而竊窺之二龍即捨舟於層岫之上折桅於深澗之下真君謂舟人曰汝不聽吾言將何所歸乎舟人乃拜求濟度真君教以服餌靈草遂得不死之銜盡隱於此山今有鐡船峯并桅為石墮在澗中真君歸舊隱數十年間不以時事關意日與群弟子講究真詮精修至道作醉思仙歌又著八寶訓曰忠孝廠愼寬裕容忍忠則不欺孝則不悖廉而罔貪愼乃無失寬則得衆裕然有餘容而翕受忍則安舒鄉里化之皆遷善遠罪孝悌興行平時出處隨機應物不異常人但所居之地鳴鶴翔飛景雲旌繞而已寧康二年甲戌真君一百三十六歲八月朔有雲仗自天二仙乘輦下降導從甚都真君向空迎拜二仙曰奉玉皇命賜紫詔授九州都仙太史兼髙明大使賜紫綵羽袍玉膏金丹各一合真君禮拜聼受訖一仙曰余乃玉真上公崔千文一仙曰余乃元真大卿瑕丘仲就告真君冲舉之日復登雲車而去真君召集門弟子與鄉曲耆老諭以行期太會于真君之庭日設宴飲共叙惜别且教以行善立功以致神仙之旨著靈劒子等書又與十一弟子各為五言二韻勸誡詩十首及遺世又以大功如意丹方傳衆弟子之不與上升者勸誡詩即今一百二十靈籖也如意丹方亦行于世每歲尚有黃中齊會云八月十五日營齊會遍召里人長少畢集至日中祥雲彌望音樂騰空羽蓋龍車從官兵衛仙童綵女導從崔瑕二詔使復降宜玉皇詔命云巳仰潜山司命官傳金丹於下界閉債封形回千身及家口廚宅百好歸三天子急淨穢背土凌空左大力天丁與流金火鈴照辟中黃無或散慢真君俯拜欽受真君遵詔使玉真上公之言以門弟子雖衆惟六人合從行餘各自有超舉之日不得偕行乃升龍車命陳勳時荷持策前導周廣曽亨驂御黃仁覽與其父族侍從盱烈與毋部從仙眷四十二口拔宅同時升舉雞犬亦隨逐飛騰里人攀戀投地悲號不忍别去真君乃留下修行鍾并石函𦕅為異時之記真君有役夫許大聞將上升苦求隨行真君以詔使告人數有定命不徇所請預期聽其與妻運米出西嶺及聞升舉乃倉惶奔歸推履米車暨至撫膺望號真君乃授以地仙子術夫婦偕隱千西山其米覆地復生既隱不欲人識攺姓午復姓干見廟食于生米市翻車岡時人或百遇見之者蓋出沒不常焉仙仗凌空有頃墜下藥曰車轂各一又墜一雞籠于宅之東南十有餘里并鼠數枚墮地巳拖腸而不死意其曽竊食仙丹也後人或有見之者必為瑞應焉升天後綵霞祥雲瀰漫山谷百里之內異香經月不散初真君自旌陽回奉蜀錦為質信於諶姆姆制為殿惟至是忽飛來遊繞故宅之上竟日復入雲霄真君初與郭璞尋真選勝經宜春棲梧山王長史之千朔迎欵敬至真君授仙術且云此地前對洞天俯臨袁水宜為道院朔從之遂書靖宇于壁而退及飛升時雲軿過其上遣二青衣告别朔舉家祈度真君曰子輩仙骨未充乃飛仙茆一根俾植之久服可長生後王族各百齡今臨江玉盧觀有仙茆存焉玄都御史神烈吳真君名猛宇世雲濮陽人性至孝以道法行吳𣈆間嘗以羽扇畫豫章江而渡寧康二年十月望奉天詔與弟千四人飛升潜惠彭真君名伉宇武陽仕𣈆為尚書左丞師真君成道宋髙祖永初二年八月二十四日舉家二十六口上升今龍興城宗華觀是其故址也洪施時真君名荷宇道陽東海沐陽縣奉仙觀黃冠上士依棲真君成道能役使鬼神驅剪邪魅及真君冲升日命執策前導焉元通周真君名廣宇惠常廬陵人師事真君遵行道法夙夜惟勒就宅西百餘步築室以居今宜詔福地太虛觀真君冲舉日驂龍車上升精行甘真君名戰字伯武豐藏人師事真君除害利物陳天建元年正月七日天詔下駕麟車冲升今富州清都觀乃藏丹之故宅號飛簧觀勇悟施真君名岑字大玉九江人勇健絶倫師事真君成道寧康二年十月二十八日奉天詔冲升西嶺至德觀即其眺望水妖之臺也神惠曾真君名亨字興國泗水人博學多能師事真君要道靈符神方祕訣無不備悉後驂龍卓同時升舉今富州真陽觀是其遺迹正特陳真君名勳字孝舉蜀川人博學洽聞真君任旌陽日付以吏職後引為門弟子託以腹心典經籍守丹罏真君冲舉日命執策前導馬和靖旴真君名烈字道微少孤事毋孝毋乃真君孟姊也真君以孀居築室于宅西居之母子得道並受詔命部從真君仙眷四十二口上升冲道黃真君名仁覽字紫庭髙安人任青州事真君以子妻之父輔字萬石舉孝廉任御史同師事真君得道舉家三十二口從真君上升普惠鍾離真君名嘉字公陽真君仲姊之子少喪父母真君授以至道寧康二年十月十五日奉天詔冲升令新建縣象牙山丹陵觀是其故址洞真胡天師名惠超字拔俗不知何代人居豫章西山洪井真君授以三元九紀之道唐長安三年二月望冲升今龍典玄妙觀是其伐樟樹精去處許真君仙傳
